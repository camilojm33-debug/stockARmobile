services:
  - type: web
    name: stockarmobile
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m flask db upgrade && gunicorn wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: MP_MODE
        value: sandbox
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: APP_URL
        value: https://stockarmobile.onrender.com
      - key: LANDING_DEMO_VIDEO_URL
        value: https://www.youtube.com/embed/5qap5aO4i9A
      - key: MP_NOTIFICATION_URL
        value: https://stockarmobile.onrender.com/admin/webhooks/mercadopago
      - key: MP_SUCCESS_URL
        value: https://stockarmobile.onrender.com/admin/portal?checkout=success
      - key: MP_PENDING_URL
        value: https://stockarmobile.onrender.com/admin/portal?checkout=pending
      - key: MP_FAILURE_URL
        value: https://stockarmobile.onrender.com/admin/portal?checkout=failure
      - key: DATABASE_URL
        fromDatabase:
          name: stockarmobile-db
          property: connectionString

databases:
  - name: stockarmobile-db
    databaseName: stockarmobile
    user: stockarmobile
