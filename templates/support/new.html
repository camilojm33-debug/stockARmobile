{% extends "base_master.html" %}
{% block title %}Ayuda - Nuevo ticket{% endblock %}
{% block content %}
<div class="app-shell">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <span class="page-kicker"><i class="bi bi-life-preserver"></i> Soporte</span>
      <h1 class="h3 fw-bold mb-0">Ayuda</h1>
      <p class="text-muted mb-0">Envia tu consulta y nuestro equipo la revisara.</p>
    </div>
    <div class="d-flex gap-2 flex-wrap justify-content-end">
      <a class="btn btn-success" href="{{ support_contact.whatsapp_link }}" target="_blank" rel="noopener">Contactar Soporte</a>
      <a class="btn btn-outline-primary" href="{{ support_contact.email_link }}">Enviar email</a>
      <a class="btn btn-outline-secondary" href="{{ url_for('support.my_tickets') if current_user.role != 'superadmin' else url_for('support.admin_index') }}">Ver tickets</a>
    </div>
  </div>

  <div class="card app-card">
    <div class="card-body">
      <form method="post" action="{{ url_for('support.new_ticket') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Email de contacto</label>
            <input type="email" class="form-control" name="email" value="{{ current_user.email or '' }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Motivo</label>
            <select class="form-select" name="reason" required>
              {% for reason in support_reasons %}
              <option value="{{ reason }}">{{ reason }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Descripcion</label>
            <textarea class="form-control" name="description" rows="6" maxlength="3000" placeholder="Detalla el problema, pasos y mensaje de error." required></textarea>
          </div>
        </div>
        <div class="mt-3 d-flex justify-content-end">
          <button class="btn btn-primary" type="submit"><i class="bi bi-send me-1"></i>Enviar solicitud</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
