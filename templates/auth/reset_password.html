{% extends "base_master.html" %}

{% block title %}Restablecer contrasena - StockArmobile{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="card app-card border-0">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <img class="auth-logo" src="{{ url_for('static', filename='images/branding/logo.png') }}" alt="StockArmobile logo">
          <h1 class="h4 fw-bold text-primary mb-1">Restablecer contrasena</h1>
          <p class="text-muted mb-0">Define una nueva contrasena para tu cuenta.</p>
        </div>
        <form method="post" action="{{ url_for('auth.reset_password', token=token) }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nueva contrasena</label>
            <input class="form-control form-control-lg" type="password" name="new_password" autocomplete="new-password" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirmar contrasena</label>
            <input class="form-control form-control-lg" type="password" name="confirm_password" autocomplete="new-password" required>
          </div>
          <button class="btn btn-primary btn-lg w-100" type="submit">Actualizar contrasena</button>
          <a class="btn btn-outline-secondary btn-lg w-100 mt-2" href="{{ url_for('auth.login') }}">Volver al login</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
