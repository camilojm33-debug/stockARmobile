{% extends "base_master.html" %}

{% block title %}Recuperar contrasena - StockArmobile{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="card app-card border-0">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="metric-icon mx-auto mb-3"><i class="bi bi-key"></i></div>
          <h1 class="h4 fw-bold text-primary mb-1">Recuperar contrasena</h1>
          <p class="text-muted mb-0">Ingresa tu correo para solicitar recuperacion.</p>
        </div>
        <form method="post" action="{{ url_for('auth.forgot_password') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-4">
            <label class="form-label fw-semibold">Correo electronico</label>
            <input class="form-control form-control-lg" type="email" name="email" value="{{ email or '' }}" required>
          </div>
          <button class="btn btn-primary btn-lg w-100" type="submit">Solicitar recuperacion</button>
          <a class="btn btn-outline-secondary btn-lg w-100 mt-2" href="{{ url_for('auth.login') }}">Volver al login</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
