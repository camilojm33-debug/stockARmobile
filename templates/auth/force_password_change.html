{% extends "base_master.html" %}

{% block title %}Cambiar contrasena - StockArmobile{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="card app-card border-0">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="metric-icon mx-auto mb-3"><i class="bi bi-shield-lock"></i></div>
          <h1 class="h4 fw-bold text-primary mb-1">Cambiar contrasena</h1>
          <p class="text-muted mb-0">Debes cambiar tu contrasena para continuar.</p>
        </div>
        <form method="post" action="{{ url_for('auth.force_password_change') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nueva contrasena</label>
            <input class="form-control form-control-lg" type="password" name="new_password" autocomplete="new-password" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirmar contrasena</label>
            <input class="form-control form-control-lg" type="password" name="confirm_password" autocomplete="new-password" required>
          </div>
          <button class="btn btn-primary btn-lg w-100" type="submit">Guardar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
