{% extends "base_master.html" %}

{% block title %}Cliente - StockArmobile{% endblock %}

{% block content %}
<div class="container">
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <h1 class="h4 fw-bold mb-3">{{ 'Editar cliente' if client else 'Nuevo cliente' }}</h1>
      <form method="post" action="{{ url_for('clients.edit', id=client.id) if client else url_for('clients.post') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Nombre</label><input class="form-control" name="name" value="{{ client.name if client else '' }}" required></div>
          <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" name="email" type="email" value="{{ client.email if client else '' }}"></div>
          <div class="col-md-4"><label class="form-label">Telefono</label><input class="form-control" name="phone" value="{{ client.phone if client else '' }}"></div>
          <div class="col-md-4"><label class="form-label">WhatsApp</label><input class="form-control" name="whatsapp" value="{{ client.whatsapp if client else '' }}"></div>
          <div class="col-md-4"><label class="form-label">Cumpleanos</label><input class="form-control" name="birthday" type="date" value="{{ client.birthday.isoformat() if client and client.birthday else '' }}"></div>
          <div class="col-md-4"><label class="form-label">Ciudad</label><input class="form-control" name="city" value="{{ client.city if client else '' }}"></div>
          <div class="col-md-4"><label class="form-label">Saldo</label><input class="form-control" name="balance" type="number" step="0.01" value="{{ client.balance if client else 0 }}"></div>
          <div class="col-md-4"><label class="form-label">Limite credito</label><input class="form-control" name="credit_limit" type="number" step="0.01" value="{{ client.credit_limit if client else 0 }}"></div>
          <div class="col-md-4"><label class="form-label">Direccion</label><input class="form-control" name="address" value="{{ client.address if client else '' }}"></div>
          <div class="col-12"><label class="form-label">Notas</label><textarea class="form-control" name="notes" rows="3">{{ client.notes if client else '' }}</textarea></div>
          <div class="col-12"><label class="form-label">Observaciones</label><textarea class="form-control" name="observations" rows="3">{{ client.observations if client else '' }}</textarea></div>
          <div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" name="account_current_enabled" id="cc-edit" {% if client and client.account_current_enabled %}checked{% endif %}><label class="form-check-label" for="cc-edit">Cuenta corriente habilitada</label></div></div>
        </div>
        <button class="btn btn-primary mt-3">Guardar</button>
        <a class="btn btn-outline-secondary mt-3" href="{{ url_for('clients.index') }}">Volver</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
